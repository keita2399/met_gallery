<!DOCTYPE html><html lang="ja" translate="no"><head>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="google" content="notranslate">
  <meta name="description" content="恐竜・宇宙・歴史 — スミソニアン博物館のコレクションを楽しむギャラリー">
  <meta name="theme-color" content="#121218">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="スミソニアン博物館さんぽ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>スミソニアン博物館さんぽ</title>
  <link rel="manifest" href="manifest.json">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #121218;
    }

    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #121218;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #splash .splash-icon {
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    #splash .splash-icon svg {
      width: 72px;
      height: 72px;
    }

    #splash .splash-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    #splash .splash-subtitle {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
    }

    #splash .splash-accent {
      width: 40px;
      height: 3px;
      background-color: #1B5E20;
      border-radius: 2px;
      margin: 16px 0;
    }

    #splash .splash-loader {
      margin-top: 48px;
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #1B5E20;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="splash-icon" style="font-size:64px;">🦖</div>
    <div class="splash-title">スミソニアン博物館さんぽ</div>
    <div class="splash-accent"></div>
    <div class="splash-subtitle" style="margin-bottom:8px;">恐竜・宇宙・歴史・宝石...</div>
    <div class="splash-subtitle">Smithsonian Walk</div>
    <div class="splash-loader"></div>
  </div>
  
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // 古いService Workerのキャッシュをクリア
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (var registration of registrations) {
          registration.unregister();
        }
      });
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var name of names) caches.delete(name);
        });
      }
    }
  </script>
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
